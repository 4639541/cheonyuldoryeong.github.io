<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>천명신당 관리자 2.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="wrap nav">
    <a class="logo" href="index.html">천명신당 관리자</a>
    <nav><a href="index.html">홈으로</a></nav>
  </div>
</header>

<main class="section wrap">
  <p class="kicker">ADMIN</p>
  <h1>관리자 로그인</h1>
  <section id="loginBox" class="formBox">
    <input id="adminEmail" type="email" placeholder="관리자 이메일">
    <input id="adminPassword" type="password" placeholder="비밀번호">
    <button id="loginBtn" class="btn primary" type="button">로그인</button>
    <div id="loginError"></div>
  </section>

  <section id="adminPanel" class="hidden">
    <div class="dashHead">
      <h2>관리자 대시보드</h2>
      <button id="logoutBtn" class="btn secondary" type="button">로그아웃</button>
    </div>

    <div class="statsGrid">
      <div><b id="statOrders">0</b><span>주문</span></div>
      <div><b id="statBookings">0</b><span>예약</span></div>
      <div><b id="statProducts">0</b><span>상품</span></div>
      <div><b id="statReviews">0</b><span>후기</span></div>
    </div>

    <div class="adminGrid">
      <article class="formBox">
        <h3>상품 등록</h3>
        <input id="pName" placeholder="상품명">
        <input id="pCategory" placeholder="카테고리 예: 염주 / 부적 / 상담">
        <input id="pPrice" placeholder="판매가 예: 25,000원">
        <input id="pSale" placeholder="할인가 선택 입력">
        <input id="pStock" placeholder="재고 예: 10개 / 품절 / 주문 가능">
        <input id="pImages" type="file" accept="image/*" multiple>
        <textarea id="pDesc" placeholder="상품 설명"></textarea>
        <label class="tiny"><input id="pBest" type="checkbox"> 베스트 상품</label>
        <button id="addProductBtn" type="button">상품 등록</button>
        <p id="productStatus" class="tiny"></p>
      </article>

      <article class="formBox">
        <h3>카카오페이 송금 설정</h3>
        <input id="payName" placeholder="받는 사람/상호 예: 천율도령">
        <input id="payAccount" placeholder="카카오페이/계좌번호 예: 02002407816">
        <input id="payLink" placeholder="카카오페이 송금 링크 선택 입력">
        <input id="payQr" type="file" accept="image/*">
        <textarea id="payGuide" placeholder="결제 안내 문구"></textarea>
        <button id="savePaymentBtn" type="button">결제 정보 저장</button>
        <p id="paymentStatus" class="tiny"></p>
      </article>

      <article class="formBox">
        <h3>상담 가격 등록/수정</h3>
        <input id="consultId" type="hidden">
        <input id="consultTitle" placeholder="상담명 예: 한 질문 상담">
        <input id="consultPrice" placeholder="가격 예: 20,000원">
        <input id="consultBadge" placeholder="표시 태그 예: 기본 / 추천 / 심층">
        <textarea id="consultDesc" placeholder="상담 설명"></textarea>
        <button id="addConsultBtn" type="button">상담 가격 저장</button>
        <button id="resetConsultBtn" type="button">새로 등록</button>
        <p class="tiny">등록한 상담 가격은 홈페이지 가격표와 예약 선택 항목에 자동 반영됩니다.</p>
      </article>

      <article class="formBox">
        <h3>게시판 글 등록</h3>
        <input id="postTitle" placeholder="글 제목">
        <input id="postImages" type="file" accept="image/*" multiple>
        <textarea id="postBody" placeholder="글 내용"></textarea>
        <button id="addPostBtn" type="button">게시글 등록</button>
        <p id="postStatus" class="tiny"></p>
      </article>

      <article class="formBox">
        <h3>상담 분야 등록</h3>
        <input id="fieldTitle" placeholder="상담 분야명">
        <textarea id="fieldBody" placeholder="상담 분야 설명"></textarea>
        <button id="addFieldBtn" type="button">상담 분야 등록</button>
      </article>

      <article class="formBox">
        <h3>공지 등록</h3>
        <input id="noticeTag" placeholder="태그">
        <input id="noticeTitle" placeholder="공지 제목">
        <textarea id="noticeBody" placeholder="공지 내용"></textarea>
        <button id="addNoticeBtn" type="button">공지 등록</button>
      </article>

      <article class="formBox">
        <h3>후기 직접 등록</h3>
        <input id="reviewDirectName" placeholder="이름/닉네임">
        <input id="reviewDirectCategory" placeholder="분야">
        <select id="reviewDirectStars"><option>★★★★★</option><option>★★★★☆</option><option>★★★☆☆</option></select>
        <input id="reviewDirectImage" type="file" accept="image/*">
        <textarea id="reviewDirectBody" placeholder="후기 내용"></textarea>
        <button id="addDirectReviewBtn" type="button">후기 공개 등록</button>
      </article>
    </div>

    <section class="adminList"><h3>상담 가격 관리</h3><div id="consultAdminList"></div></section>
    <section class="adminList"><h3>주문 관리</h3><div id="orderAdminList"></div></section>
    <section class="adminList"><h3>예약 관리</h3><div id="bookingAdminList"></div></section>
    <section class="adminList"><h3>상품 관리</h3><div id="productAdminList"></div></section>
    <section class="adminList"><h3>게시판 관리</h3><div id="postAdminList"></div></section>
    <section class="adminList"><h3>상담 분야 관리</h3><div id="fieldAdminList"></div></section>
    <section class="adminList"><h3>공지 관리</h3><div id="noticeAdminList"></div></section>
    <section class="adminList"><h3>승인 대기 후기</h3><div id="pendingReviewList"></div></section>
    <section class="adminList"><h3>공개 후기</h3><div id="approvedReviewList"></div></section>
  </section>
</main>

<script type="module" src="admin.js"></script>
</body>
</html>
