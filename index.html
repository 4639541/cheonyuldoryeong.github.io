<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>천율도령 모바일</title>
<meta name="theme-color" content="#050403">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="mobile.css?v=300">
</head>
<body>
<header class="appTop">
  <div>
    <b>천율도령</b>
    <small>공식 신점 상담</small>
  </div>
  <button id="loginOpen" class="pill" type="button">로그인</button>
</header>

<main class="screen">
  <section id="home" class="page active">
    <div class="heroCard">
      <p class="tag">17년차 황해도 이북 만신</p>
      <h1>천율도령<br>공식 신점 상담</h1>
      <p>연애 · 재회 · 속마음 · 금전운 · 사업운 · 취업운</p>
      <button class="primary" data-go="reserve" type="button">상담 예약하기</button>
      <button class="secondary" data-go="shop" type="button">상품 구매하기</button>
    </div>

    <div class="quickGrid">
      <button data-go="reserve">📅 예약</button>
      <button data-go="shop">🛍 상품</button>
      <button data-go="mypage">🎫 내 쿠폰</button>
      <button data-go="tracking">🚚 배송</button>
    </div>

    <h2>상담 가격</h2>
    <div id="priceList" class="cards"></div>

    <h2>공지사항</h2>
    <div id="noticeList" class="cards"></div>
  </section>

  <section id="shop" class="page">
    <h1>상품 구매</h1>
    <div class="searchBar">
      <input id="search" placeholder="상품 검색">
      <button id="cartOpen" class="pill" type="button">장바구니 <span id="cartCount">0</span></button>
    </div>
    <div id="productList" class="cards"></div>
  </section>

  <section id="reserve" class="page">
    <h1>상담 예약</h1>
    <div class="formCard">
      <input id="bookName" placeholder="이름/닉네임">
      <input id="bookContact" placeholder="연락처 또는 카카오톡 ID">
      <select id="bookType"></select>
      <label>상담 희망 날짜</label>
      <input id="bookDate" type="date">
      <select id="bookTime"></select>
      <textarea id="bookBody" placeholder="상담 내용"></textarea>
      <button id="bookBtn" class="primary" type="button">예약 신청</button>
    </div>
  </section>

  <section id="tracking" class="page">
    <h1>배송 조회</h1>
    <div class="formCard">
      <input id="trackNo" placeholder="주문번호">
      <input id="trackContact" placeholder="주문 시 연락처">
      <button id="trackBtn" class="primary" type="button">조회하기</button>
      <div id="trackResult"></div>
    </div>
  </section>

  <section id="mypage" class="page">
    <h1>마이페이지</h1>
    <div id="memberBox" class="formCard"></div>
    <h2>내 쿠폰</h2>
    <div id="myCoupons" class="cards"></div>
    <h2>내 주문/예약</h2>
    <div id="myHistory" class="cards"></div>
  </section>

  <section id="reviews" class="page">
    <h1>후기</h1>
    <button id="reviewOpen" class="primary" type="button">후기 작성</button>
    <div id="reviewList" class="cards"></div>
  </section>
</main>

<nav class="bottomNav">
  <button data-go="home" class="on">홈</button>
  <button data-go="reserve">예약</button>
  <button data-go="shop">상품</button>
  <button data-go="reviews">후기</button>
  <button data-go="mypage">마이</button>
</nav>

<div id="authModal" class="modal">
  <div class="sheet">
    <button class="close" data-close="authModal" type="button">×</button>
    <h2>회원</h2>
    <div class="tabs"><button id="loginTab" class="on">로그인</button><button id="joinTab">회원가입</button></div>
    <div id="loginPanel">
      <input id="loginEmail" placeholder="이메일">
      <input id="loginPw" type="password" placeholder="비밀번호">
      <button id="loginBtn" class="primary" type="button">로그인</button>
    </div>
    <div id="joinPanel" class="hide">
      <input id="joinName" placeholder="이름/닉네임">
      <input id="joinContact" placeholder="연락처/카카오톡 ID">
      <input id="joinEmail" placeholder="이메일">
      <input id="joinPw" type="password" placeholder="비밀번호 6자리 이상">
      <button id="joinBtn" class="primary" type="button">회원가입</button>
    </div>
  </div>
</div>

<div id="cartModal" class="modal">
  <div class="sheet">
    <button class="close" data-close="cartModal" type="button">×</button>
    <h2>주문 · 결제</h2>
    <div id="cartItems"></div>
    <h3>쿠폰 등록</h3>
    <div class="couponRow"><input id="couponInput" placeholder="쿠폰 코드"><button id="couponApply" class="primary" type="button">적용</button></div>
    <p id="couponText">적용된 쿠폰이 없습니다.</p>
    <h3>결제 안내</h3>
    <div id="payInfo"></div>
    <div class="summary">
      <p><span>상품금액</span><b id="subtotal">0원</b></p>
      <p><span>쿠폰할인</span><b id="discount">0원</b></p>
      <p class="total"><span>결제금액</span><b id="total">0원</b></p>
    </div>
    <input id="orderName" placeholder="이름">
    <input id="orderContact" placeholder="연락처">
    <input id="orderAddress" placeholder="배송주소">
    <textarea id="orderMemo" placeholder="요청사항"></textarea>
    <button id="orderBtn" class="primary" type="button">주문하기</button>
  </div>
</div>

<div id="reviewModal" class="modal">
  <div class="sheet">
    <button class="close" data-close="reviewModal" type="button">×</button>
    <h2>후기 작성</h2>
    <input id="reviewName" placeholder="이름">
    <input id="reviewCategory" placeholder="분야">
    <select id="reviewStars"><option>★★★★★</option><option>★★★★☆</option><option>★★★☆☆</option></select>
    <input id="reviewImages" type="file" multiple accept="image/*">
    <textarea id="reviewBody" placeholder="후기 내용"></textarea>
    <button id="reviewSubmit" class="primary" type="button">후기 등록 요청</button>
  </div>
</div>

<script type="module" src="mobile.js?v=300"></script>
</body>
</html>
