<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>천율도령 모바일 관리자</title><link rel="stylesheet" href="mobile.css?v=470"></head><body><header class="appTop">
  <span id="adminSyncStatus" class="syncStatus">연동 준비</span><div><b>관리자</b><small>모바일 전용</small></div><a class="pill" href="index.html">홈</a></header><main class="screen"><section class="formCard" id="adminLoginBox"><h1>관리자 로그인</h1><input id="adminEmail" placeholder="이메일"><input id="adminPw" type="password" placeholder="비밀번호">
        <button id="adminLogin" class="primary" type="button">로그인</button>
        <button id="adminJoin" class="secondary" type="button">관리자 최초 등록</button>
        <button id="adminResetPw" class="secondary" type="button">비밀번호 재설정 메일</button>
        <p id="adminLoginMsg" class="loginMsg"></p>
        <p class="loginHelp">로그인이 안 되면 먼저 관리자 최초 등록을 눌러 계정을 생성하세요.</p>
        </section><section id="adminPanel" class="hide"><button id="adminLogout" class="secondary">로그아웃</button><div class="quickGrid"><button data-tab="dash">대시보드</button><button data-tab="orders">주문</button><button data-tab="bookings">예약</button><button data-tab="members">회원</button><button data-tab="coupons">쿠폰</button><button data-tab="products">상품</button><button data-tab="prices">상담</button><button data-tab="settings">설정</button><button data-tab="alertCenter">알림</button><button data-tab="crmDashboard">CRM</button><button data-tab="calendarAdmin">일정</button><button data-tab="consultRecords">상담이력</button><button data-tab="spiritualManage">부적/초발원</button><button data-tab="refundManage">환불</button><button data-tab="security">보안</button><button data-tab="business">사업자</button><button data-tab="reviewsAdmin">후기</button><button data-tab="backup">백업</button><button data-tab="homeManage">홈관리</button><button data-tab="analytics">통계</button><button data-tab="banners">배너</button><button data-tab="logs">로그</button></div><div id="dash" class="adminTab"><h1>대시보드</h1><div class="quickGrid"><button>주문 <b id="statOrders">0</b></button><button>예약 <b id="statBookings">0</b></button><button>회원 <b id="statMembers">0</b></button><button>매출 <b id="statSales">0원</b></button></div></div><div id="orders" class="adminTab hide"><h1>주문관리</h1><div id="orderList"></div></div><div id="bookings" class="adminTab hide"><h1>예약관리</h1><div id="bookingList"></div></div><div id="members" class="adminTab hide"><h1>회원관리</h1><div id="memberList"></div></div><div id="coupons" class="adminTab hide"><h1>쿠폰관리</h1><div class="formCard"><select id="memberSelect"><option value="">공용 쿠폰</option></select><input id="couponCode" placeholder="쿠폰 코드"><input id="couponDiscount" placeholder="할인금액"><input id="couponDesc" placeholder="설명"><input id="couponMinOrder" placeholder="최소 주문금액 예: 30000"><input id="couponExpire" type="date"><input id="couponLimit" placeholder="사용 가능 횟수 예: 1"><button id="addCoupon" class="primary">쿠폰 발급</button></div><div id="couponList"></div></div><div id="products" class="adminTab hide"><h1>상품관리</h1><div class="formCard"><input id="pName" placeholder="상품명"><input id="pPrice" placeholder="가격"><input id="pStock" placeholder="재고"><input id="pImages" type="file" multiple accept="image/*"><textarea id="pDesc" placeholder="설명"></textarea><button id="addProduct" class="primary">상품 등록</button></div><div id="productListAdmin"></div></div><div id="prices" class="adminTab hide"><h1>상담가격</h1><div class="formCard"><input id="priceTitle" placeholder="상담명"><input id="priceAmount" placeholder="가격"><textarea id="priceDesc" placeholder="설명"></textarea><button id="addPrice" class="primary">상담가격 등록</button></div><div id="priceListAdmin"></div></div><div id="settings" class="adminTab hide"><h1>설정</h1><div class="formCard"><h3>결제 설정</h3><input id="payAccount" placeholder="카카오페이 번호"><input id="payLink" placeholder="카카오페이 링크"><input id="bankName" placeholder="은행"><input id="bankOwner" placeholder="예금주"><input id="bankAccount" placeholder="계좌번호"><textarea id="payGuide" placeholder="결제 안내"></textarea><button id="savePay" class="primary">결제 저장</button></div><div class="formCard"><h3>예약 시간</h3><textarea id="timeInput" placeholder="오전 10시&#10;오후 2시"></textarea><textarea id="blockInput" placeholder="마감 날짜 2026-07-01"></textarea><button id="saveBooking" class="primary">예약 설정 저장</button></div></div>

<div id="homeManage" class="adminTab hide">
  <h1>홈페이지 표시 관리</h1>
  <div class="formCard">
    <h3>홈 배너 등록</h3>
    <input id="homeBannerTitle" placeholder="배너 제목">
    <textarea id="homeBannerBody" placeholder="배너 내용"></textarea>
    <button id="addHomeBanner" class="primary" type="button">홈 배너 등록</button>
  </div>
  <div class="formCard">
    <h3>회원 혜택 등록</h3>
    <input id="benefitTitle" placeholder="혜택 제목 예: 신규 회원 쿠폰">
    <textarea id="benefitBody" placeholder="혜택 설명"></textarea>
    <button id="addBenefit" class="primary" type="button">혜택 등록</button>
  </div>
  <div id="homeManageList"></div>
</div>

<div id="analytics" class="adminTab hide"><h1>통계</h1><div class="quickGrid"><button>방문 <b id="statVisits">0</b></button><button>오늘주문 <b id="statTodayOrders">0</b></button><button>오늘예약 <b id="statTodayBookings">0</b></button><button>쿠폰 <b id="statCoupons">0</b></button></div><div id="salesChart" class="formCard"></div></div>
<div id="banners" class="adminTab hide"><h1>배너/팝업 관리</h1><div class="formCard"><input id="bannerTitle" placeholder="팝업 제목"><textarea id="bannerBody" placeholder="팝업 내용"></textarea><button id="saveBanner" class="primary">공지 팝업 저장</button></div><div id="bannerList"></div></div>
<div id="logs" class="adminTab hide"><h1>관리자 활동 로그</h1><div id="logList"></div></div>

<div id="business" class="adminTab hide">
  <h1>사업자 정보 관리</h1>
  <div class="formCard">
    <input id="bizName" placeholder="상호">
    <input id="bizOwner" placeholder="대표자">
    <input id="bizNumber" placeholder="사업자등록번호">
    <input id="bizAddress" placeholder="주소">
    <input id="bizType" placeholder="업태">
    <input id="bizItem" placeholder="종목">
    <input id="bizContact" placeholder="고객문의">
    <input id="bizMailOrder" placeholder="통신판매업신고">
    <button id="saveBusiness" class="primary" type="button">사업자 정보 저장</button>
  </div>
</div>
<div id="reviewsAdmin" class="adminTab hide">
  <h1>후기 승인 관리</h1>
  <h2>승인 대기</h2>
  <div id="pendingReviewList"></div>
  <h2>공개 후기</h2>
  <div id="approvedReviewList"></div>
</div>
<div id="backup" class="adminTab hide">
  <h1>백업/내보내기</h1>
  <div class="formCard">
    <button id="exportOrders" class="primary" type="button">주문 CSV 내보내기</button>
    <button id="exportMembers" class="secondary" type="button">회원 CSV 내보내기</button>
    <button id="exportBookings" class="secondary" type="button">예약 CSV 내보내기</button>
  </div>
</div>

<div id="consultRecords" class="adminTab hide">
  <h1>상담 이력 관리</h1>
  <div class="formCard">
    <select id="recordMemberSelect"><option value="">회원 선택</option></select>
    <input id="recordTitle" placeholder="상담 제목">
    <input id="recordDate" type="date">
    <textarea id="recordMemo" placeholder="상담 내용 / 점사 기록 / 고객 메모"></textarea>
    <input id="recordNextDate" type="date">
    <button id="saveRecord" class="primary" type="button">상담 이력 저장</button>
  </div>
  <div id="consultRecordList"></div>
</div>
<div id="spiritualManage" class="adminTab hide">
  <h1>부적 · 초발원 관리</h1>
  <div class="formCard">
    <input id="spAdminName" placeholder="신청자">
    <input id="spAdminContact" placeholder="연락처">
    <select id="spAdminType"><option>부적 제작</option><option>초발원</option><option>기도 신청</option><option>기타 의뢰</option></select>
    <input id="spAdminAmount" placeholder="금액">
    <textarea id="spAdminBody" placeholder="내용"></textarea>
    <button id="addSpiritualAdmin" class="primary" type="button">관리자 직접 등록</button>
  </div>
  <div id="spiritualList"></div>
</div>
<div id="refundManage" class="adminTab hide">
  <h1>취소 · 환불 관리</h1>
  <div id="refundList"></div>
</div>
<div id="security" class="adminTab hide">
  <h1>관리자 보안</h1>
  <div class="formCard">
    <input id="allowedAdminEmail" placeholder="허용 관리자 이메일">
    <button id="addAllowedAdmin" class="primary" type="button">관리자 이메일 허용</button>
  </div>
  <div id="allowedAdminList"></div>
</div>


<div id="alertCenter" class="adminTab hide">
  <h1>실시간 알림센터</h1>
  <div id="adminAlertList"></div>
</div>
<div id="crmDashboard" class="adminTab hide">
  <h1>고객 CRM 대시보드</h1>
  <div class="formCard">
    <select id="crmMemberSelect"><option value="">회원 선택</option></select>
    <textarea id="crmMemo" placeholder="고객 메모 / 주의사항 / 상담 포인트"></textarea>
    <input id="crmTag" placeholder="태그 예: VIP, 재상담필요">
    <button id="saveCrmMemo" class="primary" type="button">CRM 메모 저장</button>
  </div>
  <div id="crmSummaryList"></div>
</div>
<div id="calendarAdmin" class="adminTab hide">
  <h1>일정관리</h1>
  <div class="formCard">
    <input id="scheduleTitle" placeholder="일정 제목">
    <input id="scheduleDate" type="date">
    <input id="scheduleTime" placeholder="시간 예: 오후 2시">
    <textarea id="scheduleMemo" placeholder="일정 메모"></textarea>
    <button id="saveSchedule" class="primary" type="button">일정 저장</button>
  </div>
  <div id="scheduleList"></div>
</div>

</section></main><script type="module" src="admin-mobile.js?v=470"></script></body></html>
