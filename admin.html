<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>천명신당 관리자</title><link rel="stylesheet" href="style.css"></head><body><header class="topbar"><div class="wrap nav"><a class="logo" href="index.html">천명신당 관리자</a><nav><a href="index.html">홈으로</a></nav></div></header>
<main class="section wrap"><p class="kicker">ADMIN LOGIN</p><h1>관리자 로그인</h1><section id="loginBox" class="admin-box"><input id="adminEmail" type="email" placeholder="관리자 이메일"><input id="adminPassword" type="password" placeholder="비밀번호"><button class="full-btn" onclick="adminLogin()">로그인</button></section>
<section id="adminPanel" class="hidden"><div class="admin-box"><h2>관리자 페이지</h2><button onclick="adminLogout()">로그아웃</button></div>
<div class="admin-grid">
<article class="admin-box"><h3>상품/서비스 등록</h3><input id="productName" placeholder="상품/서비스명"><input id="productPrice" placeholder="가격 예: 25,000원 / 문의"><input id="productFile" type="file" accept="image/*"><textarea id="productDesc" placeholder="설명"></textarea><button onclick="addProduct()">이미지 업로드 후 등록</button><p class="tiny" id="productUploadStatus"></p></article>
<article class="admin-box"><h3>게시판 글 등록</h3><input id="postTitle" placeholder="글 제목"><input id="postFile" type="file" accept="image/*"><textarea id="postBody" placeholder="글 내용"></textarea><button onclick="addPost()">이미지 업로드 후 글 등록</button><p class="tiny" id="postUploadStatus"></p></article>
<article class="admin-box"><h3>상담 분야 등록</h3><input id="fieldTitle" placeholder="상담 분야명"><textarea id="fieldBody" placeholder="설명"></textarea><button onclick="addField()">상담 분야 등록</button></article>
<article class="admin-box"><h3>공지사항 등록</h3><input id="noticeTag" placeholder="태그"><input id="noticeTitle" placeholder="공지 제목"><textarea id="noticeBody" placeholder="공지 내용"></textarea><button onclick="addNotice()">공지 등록</button></article>
<article class="admin-box"><h3>후기 직접 등록</h3><input id="directReviewName" placeholder="이름/닉네임"><input id="directReviewCategory" placeholder="상담 분야"><select id="directReviewStars"><option value="★★★★★">★★★★★</option><option value="★★★★☆">★★★★☆</option></select><textarea id="directReviewBody" placeholder="후기 내용"></textarea><button onclick="addDirectReview()">후기 공개 등록</button></article>
</div>
<section class="admin-box"><h3>예약 요청</h3><div id="reservationList"></div></section><section class="admin-box"><h3>상품/서비스 목록</h3><div id="adminProductList"></div></section><section class="admin-box"><h3>게시판 목록</h3><div id="adminBoardList"></div></section><section class="admin-box"><h3>상담 분야 목록</h3><div id="adminFieldList"></div></section><section class="admin-box"><h3>공지사항 목록</h3><div id="adminNoticeList"></div></section><section class="admin-box"><h3>승인 대기 후기</h3><div id="pendingReviewList"></div></section><section class="admin-box"><h3>공개 후기</h3><div id="adminReviewList"></div></section>
</section></main><script type="module" src="admin.js"></script></body></html>
