<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>천율도령 관리자</title><link rel="stylesheet" href="mobile.css?v=1300"></head><body>
<header class="topbar"><div class="brand"><strong>관리자</strong><span>천율도령</span></div><button onclick="location.href='index.html'">홈</button><button id="exportBtn">백업</button></header><main id="app"><section class="page active"><h1>관리자</h1>
<div class="adminTabs"><button data-tab="dash" class="active">대시보드</button><button data-tab="profile">프로필</button><button data-tab="services">상담</button><button data-tab="products">상품</button><button data-tab="orders">주문</button><button data-tab="reservations">예약</button><button data-tab="payments">결제</button><button data-tab="inquiries">문의</button><button data-tab="reviews">후기</button><button data-tab="notice">공지</button><button data-tab="coupons">쿠폰</button><button data-tab="points">적립금</button><button data-tab="members">회원</button><button data-tab="events">이벤트</button><button data-tab="seo">SEO</button><button data-tab="settings">사업자</button></div>
<div id="dash" class="adminPanel active card"><h2>📊 실시간 대시보드</h2><div id="adminDashboard"></div></div>
<div id="profile" class="adminPanel card"><h2>📷 프로필 이미지 변경</h2><img id="adminProfilePreview" src="./assets/cheonyul_profile.png" class="smallProfile"><input id="profileImageInput" type="file" accept="image/*"><button class="primary" id="saveProfileImage">프로필 저장</button><button class="secondary" id="resetProfileImage">기본 이미지로 복구</button></div>
<div id="services" class="adminPanel card"><h2>🔮 상담 관리</h2><input id="serviceName" placeholder="상담명"><input id="servicePrice" placeholder="가격"><textarea id="serviceDesc" placeholder="설명"></textarea><button class="primary" id="addService">상담 등록</button><div id="adminServiceList"></div></div>
<div id="products" class="adminPanel card"><h2>🛍️ 상품 관리</h2><input id="productName" placeholder="상품명"><input id="productPrice" placeholder="가격"><textarea id="productDesc" placeholder="상품 설명"></textarea><button class="primary" id="addProduct">상품 등록</button><div id="adminProductList"></div></div>
<div id="orders" class="adminPanel card"><h2>📦 주문 관리</h2><input id="orderName" placeholder="주문자"><input id="orderItem" placeholder="상품명"><input id="orderAmount" placeholder="금액"><select id="orderStatus"><option>주문접수</option><option>결제대기</option><option>결제완료</option><option>준비중</option><option>배송중</option><option>배송완료</option><option>취소</option></select><button class="primary" id="addOrder">주문 등록</button><div id="adminOrderList"></div></div>
<div id="reservations" class="adminPanel card"><h2>📅 예약 관리</h2><input id="resName" placeholder="예약자명"><input id="resType" placeholder="상담 종류"><input id="resTime" placeholder="예약 시간"><select id="resStatus"><option>예약대기</option><option>예약승인</option><option>상담중</option><option>상담완료</option><option>취소</option></select><button class="primary" id="addReservation">예약 등록</button><div id="adminReservationList"></div></div>
<div id="payments" class="adminPanel card"><h2>💳 결제 관리</h2><input id="payName" placeholder="입금자명"><input id="payAmount" placeholder="금액"><select id="payStatus"><option>결제대기</option><option>결제완료</option><option>환불요청</option><option>환불완료</option></select><button class="primary" id="addPayment">결제 등록</button><div id="adminPaymentList"></div></div>
<div id="inquiries" class="adminPanel card"><h2>💬 문의 관리</h2><input id="inqName" placeholder="문의자"><textarea id="inqText" placeholder="문의 내용"></textarea><textarea id="inqAnswer" placeholder="관리자 답변"></textarea><button class="primary" id="addInquiry">문의 등록/답변</button><div id="adminInquiryList"></div></div>
<div id="reviews" class="adminPanel card"><h2>⭐ 후기 관리</h2><input id="reviewTitle" placeholder="후기 제목"><textarea id="reviewText" placeholder="후기 내용"></textarea><button class="primary" id="addReview">후기 등록</button><div id="adminReviewList"></div></div>
<div id="notice" class="adminPanel card"><h2>📢 공지사항</h2><textarea id="noticeText" placeholder="공지 내용"></textarea><button class="primary" id="saveNotice">공지 저장</button><button class="secondary" id="clearNotice">공지 삭제</button></div>
<div id="coupons" class="adminPanel card"><h2>🎟️ 쿠폰 관리</h2><input id="couponName" placeholder="쿠폰명"><input id="couponBenefit" placeholder="혜택"><button class="primary" id="addCoupon">쿠폰 등록</button><div id="adminCouponList"></div></div>
<div id="points" class="adminPanel card"><h2>💎 적립금 관리</h2><input id="pointName" placeholder="회원명"><input id="pointAmount" placeholder="지급/차감 금액"><input id="pointMemo" placeholder="사유"><button class="primary" id="addPoint">적립금 지급/차감</button><div id="adminPointList"></div></div>
<div id="members" class="adminPanel card"><h2>👤 회원/CRM</h2><input id="memberName" placeholder="회원명"><input id="memberMemo" placeholder="상담메모/VIP/블랙리스트"><select id="memberGrade"><option>일반</option><option>VIP</option><option>블랙리스트</option></select><button class="primary" id="addMember">회원 등록</button><div id="adminMemberList"></div></div>
<div id="events" class="adminPanel card"><h2>🎁 이벤트 관리</h2><input id="eventName" placeholder="이벤트명"><textarea id="eventDesc" placeholder="이벤트 내용"></textarea><button class="primary" id="addEvent">이벤트 등록</button><div id="adminEventList"></div></div>
<div id="seo" class="adminPanel card"><h2>🔎 SEO 관리</h2><input id="seoTitle" placeholder="사이트 제목"><textarea id="seoDesc" placeholder="사이트 설명"></textarea><button class="primary" id="saveSeo">SEO 저장</button></div>
<div id="settings" class="adminPanel card"><h2>사업자 정보</h2><textarea id="businessText"></textarea><button class="primary" id="saveBusiness">사업자 정보 저장</button></div>
</section></main><script src="admin.js?v=1300"></script></body></html>
