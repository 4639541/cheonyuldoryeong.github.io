<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>천율도령 모바일 관리자</title><link rel="stylesheet" href="mobile.css?v=300"></head><body><header class="appTop"><div><b>관리자</b><small>모바일 전용</small></div><a class="pill" href="index.html">홈</a></header><main class="screen"><section class="formCard" id="adminLoginBox"><h1>관리자 로그인</h1><input id="adminEmail" placeholder="이메일"><input id="adminPw" type="password" placeholder="비밀번호"><button id="adminLogin" class="primary">로그인</button></section><section id="adminPanel" class="hide"><button id="adminLogout" class="secondary">로그아웃</button><div class="quickGrid"><button data-tab="dash">대시보드</button><button data-tab="orders">주문</button><button data-tab="bookings">예약</button><button data-tab="members">회원</button><button data-tab="coupons">쿠폰</button><button data-tab="products">상품</button><button data-tab="prices">상담</button><button data-tab="settings">설정</button></div><div id="dash" class="adminTab"><h1>대시보드</h1><div class="quickGrid"><button>주문 <b id="statOrders">0</b></button><button>예약 <b id="statBookings">0</b></button><button>회원 <b id="statMembers">0</b></button><button>매출 <b id="statSales">0원</b></button></div></div><div id="orders" class="adminTab hide"><h1>주문관리</h1><div id="orderList"></div></div><div id="bookings" class="adminTab hide"><h1>예약관리</h1><div id="bookingList"></div></div><div id="members" class="adminTab hide"><h1>회원관리</h1><div id="memberList"></div></div><div id="coupons" class="adminTab hide"><h1>쿠폰관리</h1><div class="formCard"><select id="memberSelect"><option value="">공용 쿠폰</option></select><input id="couponCode" placeholder="쿠폰 코드"><input id="couponDiscount" placeholder="할인금액"><input id="couponDesc" placeholder="설명"><button id="addCoupon" class="primary">쿠폰 발급</button></div><div id="couponList"></div></div><div id="products" class="adminTab hide"><h1>상품관리</h1><div class="formCard"><input id="pName" placeholder="상품명"><input id="pPrice" placeholder="가격"><input id="pStock" placeholder="재고"><input id="pImages" type="file" multiple accept="image/*"><textarea id="pDesc" placeholder="설명"></textarea><button id="addProduct" class="primary">상품 등록</button></div><div id="productListAdmin"></div></div><div id="prices" class="adminTab hide"><h1>상담가격</h1><div class="formCard"><input id="priceTitle" placeholder="상담명"><input id="priceAmount" placeholder="가격"><textarea id="priceDesc" placeholder="설명"></textarea><button id="addPrice" class="primary">상담가격 등록</button></div><div id="priceListAdmin"></div></div><div id="settings" class="adminTab hide"><h1>설정</h1><div class="formCard"><h3>결제 설정</h3><input id="payAccount" placeholder="카카오페이 번호"><input id="payLink" placeholder="카카오페이 링크"><input id="bankName" placeholder="은행"><input id="bankOwner" placeholder="예금주"><input id="bankAccount" placeholder="계좌번호"><textarea id="payGuide" placeholder="결제 안내"></textarea><button id="savePay" class="primary">결제 저장</button></div><div class="formCard"><h3>예약 시간</h3><textarea id="timeInput" placeholder="오전 10시&#10;오후 2시"></textarea><textarea id="blockInput" placeholder="마감 날짜 2026-07-01"></textarea><button id="saveBooking" class="primary">예약 설정 저장</button></div></div></section></main><script type="module" src="admin-mobile.js?v=300"></script></body></html>
